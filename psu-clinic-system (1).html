<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSU Clinic — Digital Queueing & Schedule Management System</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --psu-royal-blue: #0927D8;
    --psu-blue-deep: #071aad;
    --psu-blue-dark: #040e6e;
    --psu-blue-navy: #020847;
    --psu-golden: #FFDA27;
    --psu-golden-warm: #f5c400;
    --psu-golden-deep: #d4a800;
    --medical-white: #f8faff;
    --medical-soft: #edf2ff;
    --medical-green: #00b894;
    --medical-green-soft: #00cec9;
    --medical-red: #e17055;
    --medical-teal: #0984e3;
    --text-dark: #0a0e2e;
    --text-mid: #2d3561;
    --text-light: #6b7bb8;
    --glass-bg: rgba(255,255,255,0.07);
    --glass-border: rgba(255,218,39,0.2);
    --shadow-gold: 0 0 40px rgba(255,218,39,0.15);
    --shadow-blue: 0 20px 60px rgba(9,39,216,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--psu-blue-navy);
    color: var(--medical-white);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, var(--psu-blue-navy) 0%, var(--psu-blue-dark) 40%, #0d1f8f 70%, var(--psu-royal-blue) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #splash.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

  .splash-particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: float-particle linear infinite;
    opacity: 0;
  }

  @keyframes float-particle {
    0%   { opacity: 0; transform: translateY(100vh) scale(0); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-20vh) scale(1.2); }
  }

  .splash-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,218,39,0.15);
    animation: expand-ring 3s ease-out infinite;
  }
  @keyframes expand-ring {
    0%   { transform: scale(0.5); opacity: 0.8; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .splash-logo-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: splash-entry 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }

  @keyframes splash-entry {
    from { opacity: 0; transform: translateY(60px) scale(0.8); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .psu-seal-svg {
    width: 160px;
    height: 160px;
    filter: drop-shadow(0 0 30px rgba(255,218,39,0.5));
    animation: seal-pulse 3s ease-in-out infinite;
  }
  @keyframes seal-pulse {
    0%, 100% { filter: drop-shadow(0 0 30px rgba(255,218,39,0.5)); }
    50%       { filter: drop-shadow(0 0 60px rgba(255,218,39,0.9)); }
  }

  .splash-university-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 900;
    color: var(--psu-golden);
    text-align: center;
    margin-top: 24px;
    letter-spacing: 0.08em;
    text-shadow: 0 2px 20px rgba(255,218,39,0.4);
    animation: text-shimmer 2s ease-in-out infinite alternate;
  }
  @keyframes text-shimmer {
    from { text-shadow: 0 2px 20px rgba(255,218,39,0.4); }
    to   { text-shadow: 0 2px 40px rgba(255,218,39,0.8), 0 0 80px rgba(255,218,39,0.3); }
  }

  .splash-subtitle {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 8px;
    animation: fade-in-up 0.8s ease 1.2s both;
  }

  .splash-divider {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--psu-golden), transparent);
    margin: 20px 0;
    animation: fade-in-up 0.8s ease 1.4s both;
  }

  .splash-system-name {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-align: center;
    animation: fade-in-up 0.8s ease 1.6s both;
  }

  .splash-loading {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fade-in-up 0.8s ease 1.8s both;
  }

  .loading-bar-track {
    width: 280px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--psu-royal-blue), var(--psu-golden));
    border-radius: 2px;
    animation: loading-fill 2.5s ease 2s both;
    width: 0%;
  }
  @keyframes loading-fill {
    to { width: 100%; }
  }

  .loading-text {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    font-family: 'JetBrains Mono', monospace;
    animation: blink 1s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MAIN APP ── */
  #app {
    opacity: 0;
    transition: opacity 0.8s ease 0.2s;
    min-height: 100vh;
  }
  #app.visible { opacity: 1; }

  /* ── TOPNAV ── */
  .topnav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(2,8,71,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,218,39,0.2);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }
  .nav-seal { width: 38px; height: 38px; }
  .nav-brand-text { display: flex; flex-direction: column; }
  .nav-brand-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--psu-golden);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }
  .nav-brand-sub {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .nav-tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    padding: 4px;
    border-radius: 10px;
  }
  .nav-tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.05em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-tab:hover { color: white; background: rgba(255,255,255,0.08); }
  .nav-tab.active {
    background: var(--psu-royal-blue);
    color: var(--psu-golden);
    box-shadow: 0 2px 12px rgba(9,39,216,0.4);
  }

  .nav-actions { display: flex; align-items: center; gap: 12px; }
  .nav-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
  }
  .nav-status-dot {
    width: 8px; height: 8px;
    background: var(--medical-green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--medical-green);
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── HERO SECTION ── */
  .hero {
    background: linear-gradient(160deg, var(--psu-blue-navy) 0%, var(--psu-blue-dark) 50%, #0d1f8f 100%);
    padding: 60px 40px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(9,39,216,0.4), transparent),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(255,218,39,0.06), transparent);
  }
  .hero-cross {
    position: absolute;
    font-size: 200px;
    color: rgba(255,255,255,0.02);
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    font-weight: 900;
    line-height: 1;
    user-select: none;
    animation: float-cross 6s ease-in-out infinite;
  }
  @keyframes float-cross { 0%,100%{transform:translateY(-50%) rotate(0deg)} 50%{transform:translateY(-55%) rotate(5deg)} }

  .hero-content { position: relative; z-index: 1; }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,218,39,0.1);
    border: 1px solid rgba(255,218,39,0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--psu-golden);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: fade-in-up 0.6s ease 0.2s both;
  }
  .hero-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 4vw, 3.2rem);
    font-weight: 700;
    color: white;
    line-height: 1.15;
    margin-bottom: 16px;
    animation: fade-in-up 0.6s ease 0.4s both;
  }
  .hero-title span { color: var(--psu-golden); }
  .hero-desc {
    font-size: 1rem;
    color: rgba(255,255,255,0.65);
    max-width: 560px;
    margin: 0 auto 36px;
    line-height: 1.7;
    animation: fade-in-up 0.6s ease 0.6s both;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    animation: fade-in-up 0.6s ease 0.8s both;
  }
  .hero-stat { text-align: center; }
  .hero-stat-num {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--psu-golden);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── MODULE PORTAL (LOGIN SELECTION) ── */
  .portal-section {
    padding: 60px 40px;
    background: linear-gradient(180deg, #0d1f8f 0%, var(--psu-blue-navy) 100%);
  }
  .section-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .section-eyebrow {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--psu-golden);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 700;
    color: white;
  }
  .section-line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--psu-royal-blue), var(--psu-golden));
    margin: 16px auto 0;
    border-radius: 2px;
  }

  .portal-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  .portal-card {
    background: linear-gradient(135deg, rgba(9,39,216,0.25), rgba(2,8,71,0.6));
    border: 1px solid rgba(255,218,39,0.15);
    border-radius: 20px;
    padding: 36px 28px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .portal-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,218,39,0.08), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 20px;
  }
  .portal-card::after {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(135deg, var(--psu-golden), var(--psu-royal-blue), var(--psu-golden));
    border-radius: 22px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .portal-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 24px 60px rgba(9,39,216,0.4), 0 0 40px rgba(255,218,39,0.1);
    border-color: rgba(255,218,39,0.4);
  }
  .portal-card:hover::before { opacity: 1; }

  .portal-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--psu-royal-blue), var(--psu-blue-deep));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(9,39,216,0.4);
    transition: transform 0.3s ease;
  }
  .portal-card:hover .portal-icon { transform: scale(1.1) rotate(-5deg); }

  .portal-card-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
  }
  .portal-card-desc {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .portal-card-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .portal-card-features li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.65);
  }
  .feat-dot {
    width: 6px; height: 6px;
    background: var(--psu-golden);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .portal-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, var(--psu-royal-blue), var(--psu-blue-deep));
    border: none;
    border-radius: 10px;
    color: var(--psu-golden);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .portal-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,218,39,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .portal-btn:hover::after { transform: translateX(100%); }
  .portal-btn:hover { box-shadow: 0 4px 20px rgba(9,39,216,0.5); transform: translateY(-1px); }

  /* ── MODAL / PANEL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,8,71,0.85);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: modal-fade-in 0.3s ease;
  }
  @keyframes modal-fade-in { from{opacity:0} to{opacity:1} }

  .modal-panel {
    background: linear-gradient(145deg, #0d1f8f, var(--psu-blue-navy));
    border: 1px solid rgba(255,218,39,0.2);
    border-radius: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 60px rgba(9,39,216,0.3);
    animation: modal-slide-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
    scrollbar-width: thin;
    scrollbar-color: rgba(255,218,39,0.3) transparent;
  }
  @keyframes modal-slide-in {
    from { opacity:0; transform: translateY(30px) scale(0.95); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .modal-panel::-webkit-scrollbar { width: 4px; }
  .modal-panel::-webkit-scrollbar-track { background: transparent; }
  .modal-panel::-webkit-scrollbar-thumb { background: rgba(255,218,39,0.3); border-radius: 2px; }

  .modal-header {
    padding: 28px 28px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,218,39,0.1);
    padding-bottom: 20px;
    margin-bottom: 24px;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
  }
  .modal-sub {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }
  .modal-close {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items:center; justify-content:center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .modal-close:hover { background: rgba(255,255,255,0.15); color: white; }

  .modal-body { padding: 0 28px 28px; }

  /* ── FORM ELEMENTS ── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 14px;
    color: white;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.25s ease;
  }
  .form-input::placeholder { color: rgba(255,255,255,0.3); }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(255,218,39,0.5);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(255,218,39,0.1);
  }
  .form-select option { background: #0d1f8f; color: white; }
  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, var(--psu-royal-blue), var(--psu-blue-deep));
    border: 1px solid rgba(255,218,39,0.3);
    border-radius: 10px;
    color: var(--psu-golden);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 8px;
  }
  .btn-primary:hover { box-shadow: 0 4px 24px rgba(9,39,216,0.5); transform: translateY(-2px); }

  .btn-secondary {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: rgba(255,255,255,0.7);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.3); color: white; }

  .form-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }
  .form-divider-line { flex:1; height:1px; background: rgba(255,255,255,0.1); }
  .form-divider-text { font-size:0.75rem; color:rgba(255,255,255,0.3); }

  /* ── DASHBOARD LAYOUT ── */
  .dashboard {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }
  .sidebar {
    background: rgba(2,8,71,0.95);
    border-right: 1px solid rgba(255,218,39,0.12);
    padding: 24px 0;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
  }
  .sidebar-section-title {
    font-size: 0.65rem;
    font-weight: 700;
    color: rgba(255,218,39,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0 20px;
    margin: 20px 0 8px;
  }
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.55);
    border-left: 3px solid transparent;
    margin: 1px 0;
  }
  .sidebar-nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
  .sidebar-nav-item.active {
    color: var(--psu-golden);
    background: rgba(9,39,216,0.3);
    border-left-color: var(--psu-golden);
  }
  .sidebar-icon { font-size: 1rem; width: 20px; text-align: center; }

  .sidebar-user-card {
    margin: 16px;
    padding: 14px;
    background: rgba(9,39,216,0.25);
    border: 1px solid rgba(255,218,39,0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--psu-royal-blue), var(--psu-golden-warm));
    border-radius: 10px;
    display: flex; align-items:center; justify-content:center;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .sidebar-user-name { font-size: 0.82rem; font-weight: 600; color: white; }
  .sidebar-user-role { font-size: 0.7rem; color: rgba(255,255,255,0.45); margin-top: 1px; }

  .dash-content { padding: 32px; overflow-y: auto; }
  .dash-content-inner { max-width: 1000px; }

  /* ── DASHBOARD WIDGETS ── */
  .dash-greeting {
    margin-bottom: 32px;
  }
  .dash-greeting-tag {
    font-size: 0.7rem;
    color: rgba(255,218,39,0.7);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .dash-greeting-title {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: white;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: linear-gradient(135deg, rgba(9,39,216,0.2), rgba(2,8,71,0.5));
    border: 1px solid rgba(255,218,39,0.12);
    border-radius: 16px;
    padding: 20px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(255,218,39,0.08), transparent);
    border-radius: 50%;
  }
  .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(9,39,216,0.3); }
  .stat-icon { font-size: 1.4rem; margin-bottom: 12px; }
  .stat-val {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: white;
    line-height: 1;
  }
  .stat-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
  .stat-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 700;
    margin-top: 8px;
  }
  .stat-badge.green { background: rgba(0,184,148,0.15); color: var(--medical-green); }
  .stat-badge.blue  { background: rgba(9,132,227,0.15); color: var(--medical-teal); }
  .stat-badge.gold  { background: rgba(255,218,39,0.12); color: var(--psu-golden); }

  .content-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width:720px) { .content-row { grid-template-columns: 1fr; } }

  .panel {
    background: linear-gradient(135deg, rgba(9,39,216,0.15), rgba(2,8,71,0.5));
    border: 1px solid rgba(255,218,39,0.12);
    border-radius: 16px;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,218,39,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-body { padding: 16px 20px; }
  .panel-action {
    font-size: 0.75rem;
    color: var(--psu-golden);
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    border: none;
    background: none;
    font-family: inherit;
  }
  .panel-action:hover { opacity: 1; }

  /* ── QUEUE DISPLAY ── */
  .queue-now {
    text-align: center;
    padding: 24px 16px;
    background: linear-gradient(135deg, rgba(9,39,216,0.3), rgba(2,8,71,0.7));
    border-radius: 12px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .queue-now::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(9,39,216,0.3), transparent 70%);
    animation: queue-glow 3s ease-in-out infinite;
  }
  @keyframes queue-glow { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .queue-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    position: relative;
  }
  .queue-number {
    font-family: 'Cinzel', serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--psu-golden);
    line-height: 1;
    position: relative;
    text-shadow: 0 0 30px rgba(255,218,39,0.5);
    animation: num-pulse 2s ease-in-out infinite;
  }
  @keyframes num-pulse { 0%,100%{text-shadow:0 0 30px rgba(255,218,39,0.5)} 50%{text-shadow:0 0 60px rgba(255,218,39,0.9)} }
  .queue-name { font-size: 0.9rem; color: rgba(255,255,255,0.7); position: relative; }

  .queue-list { display: flex; flex-direction: column; gap: 8px; }
  .queue-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.2s ease;
  }
  .queue-item:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,218,39,0.15); }
  .queue-pos {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--psu-golden);
    width: 32px;
    text-align: center;
  }
  .queue-info { flex: 1; }
  .queue-item-name { font-size: 0.85rem; font-weight: 600; color: white; }
  .queue-item-type { font-size: 0.72rem; color: rgba(255,255,255,0.45); }
  .queue-eta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: rgba(255,218,39,0.7);
    text-align: right;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 600;
  }
  .status-pill.waiting  { background:rgba(255,218,39,0.12); color:var(--psu-golden); }
  .status-pill.serving  { background:rgba(0,184,148,0.12); color:var(--medical-green); }
  .status-pill.done     { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.4); }
  .status-pill.priority { background:rgba(225,112,85,0.15); color:var(--medical-red); }

  /* ── APPOINTMENT CARDS ── */
  .appt-list { display: flex; flex-direction: column; gap: 10px; }
  .appt-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .appt-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,218,39,0.2); transform: translateX(4px); }
  .appt-date {
    background: rgba(9,39,216,0.4);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
    flex-shrink: 0;
  }
  .appt-date-day { font-family:'Cinzel',serif; font-size:1.3rem; font-weight:700; color:var(--psu-golden); line-height:1; }
  .appt-date-mon { font-size:0.65rem; color:rgba(255,255,255,0.5); letter-spacing:0.1em; text-transform:uppercase; }
  .appt-info { flex: 1; }
  .appt-type { font-size: 0.88rem; font-weight: 600; color: white; }
  .appt-time { font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:rgba(255,255,255,0.45); margin-top:2px; }
  .appt-doctor { font-size:0.72rem; color:rgba(255,218,39,0.7); margin-top:2px; }

  /* ── SCHEDULE GRID ── */
  .sched-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 8px;
  }
  .sched-day-header {
    font-size: 0.65rem;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-align: center;
    padding: 6px 0;
    text-transform: uppercase;
  }
  .sched-slot {
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    font-size: 0.75rem;
  }
  .sched-slot:hover { transform: scale(1.05); }
  .sched-slot.avail  { background:rgba(0,184,148,0.15); color:var(--medical-green); border:1px solid rgba(0,184,148,0.25); }
  .sched-slot.busy   { background:rgba(225,112,85,0.15); color:var(--medical-red); border:1px solid rgba(225,112,85,0.2); }
  .sched-slot.off    { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.2); border:1px solid transparent; }
  .sched-slot.today  { box-shadow: 0 0 0 2px var(--psu-golden); }

  /* ── CHART BAR ── */
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
  .chart-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .chart-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.8s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .chart-bar.blue  { background: linear-gradient(to top, var(--psu-royal-blue), #4169e1); }
  .chart-bar.gold  { background: linear-gradient(to top, var(--psu-golden-warm), var(--psu-golden)); }
  .chart-bar.green { background: linear-gradient(to top, var(--medical-green), var(--medical-green-soft)); }
  .chart-day { font-size:0.6rem; color:rgba(255,255,255,0.4); text-transform:uppercase; }

  /* ── NOTIFICATION ── */
  .notif-list { display:flex; flex-direction:column; gap:8px; }
  .notif-item {
    display:flex;
    gap:10px;
    padding:10px 12px;
    background:rgba(255,255,255,0.04);
    border-radius:10px;
    border-left:3px solid transparent;
    transition: all 0.2s ease;
  }
  .notif-item.info   { border-left-color:var(--psu-royal-blue); }
  .notif-item.warn   { border-left-color:var(--psu-golden); }
  .notif-item.succ   { border-left-color:var(--medical-green); }
  .notif-icon { font-size:1rem; flex-shrink:0; margin-top:1px; }
  .notif-text { font-size:0.8rem; color:rgba(255,255,255,0.75); line-height:1.4; }
  .notif-time { font-size:0.65rem; color:rgba(255,255,255,0.35); margin-top:3px; font-family:'JetBrains Mono',monospace; }

  /* ── PATIENT LOG TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width:100%; border-collapse:collapse; }
  th {
    font-size:0.65rem;
    font-weight:700;
    color:rgba(255,218,39,0.6);
    letter-spacing:0.15em;
    text-transform:uppercase;
    padding:10px 12px;
    text-align:left;
    border-bottom:1px solid rgba(255,218,39,0.1);
    white-space:nowrap;
  }
  td {
    padding:10px 12px;
    font-size:0.82rem;
    color:rgba(255,255,255,0.75);
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.03); color:white; }

  /* ── CALL NEXT BUTTON ── */
  .call-next-btn {
    background: linear-gradient(135deg, var(--medical-green), var(--medical-green-soft));
    border: none;
    border-radius: 14px;
    padding: 18px 32px;
    color: white;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 24px rgba(0,184,148,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }
  .call-next-btn:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 12px 36px rgba(0,184,148,0.5);
  }
  .call-next-btn:active { transform: translateY(0) scale(0.99); }

  /* ── ADMIN REPORT ── */
  .report-metric-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .report-metric {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .report-metric-val {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--psu-golden);
  }
  .report-metric-label { font-size:0.7rem; color:rgba(255,255,255,0.45); margin-top:4px; }

  .ailment-row {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .ailment-label { font-size:0.8rem; color:rgba(255,255,255,0.7); width:120px; flex-shrink:0; }
  .ailment-bar-track { flex:1; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .ailment-bar-fill {
    height:100%;
    border-radius:3px;
    background: linear-gradient(90deg, var(--psu-royal-blue), var(--psu-golden));
    transition: width 1s ease;
  }
  .ailment-pct { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:rgba(255,218,39,0.7); width:32px; text-align:right; }

  /* ── USER MGMT ── */
  .user-table-row { cursor: pointer; }
  .user-avatar-sm {
    width:28px; height:28px;
    background:linear-gradient(135deg, var(--psu-royal-blue), var(--psu-golden-warm));
    border-radius:8px;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:0.7rem; font-weight:700; color:white;
  }
  .role-badge {
    display:inline-block;
    padding:2px 8px;
    border-radius:6px;
    font-size:0.65rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.1em;
  }
  .role-badge.student { background:rgba(9,39,216,0.25); color:#7a9fff; }
  .role-badge.staff   { background:rgba(0,184,148,0.2); color:var(--medical-green); }
  .role-badge.admin   { background:rgba(255,218,39,0.15); color:var(--psu-golden); }

  /* ── FLOATING BREADCRUMB ── */
  .breadcrumb {
    display:flex; align-items:center; gap:6px;
    font-size:0.75rem;
    color:rgba(255,255,255,0.4);
    margin-bottom:24px;
  }
  .breadcrumb-sep { color:rgba(255,255,255,0.2); }
  .breadcrumb-cur { color:rgba(255,255,255,0.75); }

  /* ── RESPONSIVE ── */
  @media(max-width:760px) {
    .dashboard { grid-template-columns: 1fr; }
    .sidebar { display:none; }
    .nav-tabs { display:none; }
    .form-row { grid-template-columns:1fr; }
    .hero { padding:40px 24px; }
    .portal-section { padding:40px 24px; }
    .dash-content { padding:20px; }
    .content-row { grid-template-columns:1fr; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }

  /* ── TOAST ── */
  .toast-container { position:fixed; bottom:24px; right:24px; z-index:9000; display:flex; flex-direction:column; gap:8px; }
  .toast {
    background:rgba(9,39,216,0.95);
    border:1px solid rgba(255,218,39,0.3);
    border-radius:12px;
    padding:12px 18px;
    font-size:0.82rem;
    color:white;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    animation: toast-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width:300px;
    display:flex; align-items:center; gap:10px;
  }
  .toast.exit { animation: toast-out 0.3s ease forwards; }
  @keyframes toast-in  { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes toast-out { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(40px)} }

  /* ── MEDICAL CROSS DECORATION ── */
  .med-cross-deco {
    display:inline-flex; align-items:center; justify-content:center;
    width:18px; height:18px; position:relative;
  }
  .med-cross-deco::before, .med-cross-deco::after {
    content:'';
    position:absolute;
    background:var(--medical-green);
    border-radius:1px;
  }
  .med-cross-deco::before { width:3px; height:14px; }
  .med-cross-deco::after  { width:14px; height:3px; }

  /* ── ANIMATED DOTS ── */
  .typing-dots span {
    display:inline-block;
    width:4px; height:4px;
    background:var(--psu-golden);
    border-radius:50%;
    margin:0 1px;
    animation: dot-bounce 1.4s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay:0.2s; }
  .typing-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes dot-bounce { 0%,80%,100%{transform:scale(0.8); opacity:0.5} 40%{transform:scale(1.2); opacity:1} }

  .text-gold { color: var(--psu-golden); }
  .text-green { color: var(--medical-green); }
  .text-muted { color: rgba(255,255,255,0.45); font-size:0.78rem; }
  .mt-4 { margin-top:4px; }
  .mt-8 { margin-top:8px; }
  .mt-16 { margin-top:16px; }
  .full-panel { grid-column: 1 / -1; }
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-particles" id="particles"></div>
  <div class="splash-ring" style="width:300px;height:300px;animation-delay:0s"></div>
  <div class="splash-ring" style="width:500px;height:500px;animation-delay:1s"></div>
  <div class="splash-ring" style="width:700px;height:700px;animation-delay:2s"></div>
  <div class="splash-logo-container">
    <!-- PSU Seal SVG (vector representation) -->
    <svg class="psu-seal-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="sealGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a3fe0"/>
          <stop offset="100%" stop-color="#0727D8"/>
        </radialGradient>
        <radialGradient id="innerGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#0d2aad"/>
          <stop offset="100%" stop-color="#020847"/>
        </radialGradient>
      </defs>
      <!-- Outer ring -->
      <circle cx="100" cy="100" r="96" fill="url(#sealGrad)" stroke="#FFDA27" stroke-width="3"/>
      <!-- Inner circle -->
      <circle cx="100" cy="100" r="75" fill="url(#innerGrad)"/>
      <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(255,218,39,0.4)" stroke-width="1"/>
      <!-- Lion body (simplified) -->
      <ellipse cx="100" cy="118" rx="30" ry="26" fill="#FFDA27" opacity="0.9"/>
      <!-- Lion head -->
      <circle cx="100" cy="88" r="20" fill="#FFDA27" opacity="0.9"/>
      <!-- Mane detail -->
      <circle cx="100" cy="88" r="24" fill="none" stroke="#d4a800" stroke-width="4" opacity="0.7"/>
      <!-- Eyes -->
      <circle cx="93" cy="85" r="2.5" fill="#020847"/>
      <circle cx="107" cy="85" r="2.5" fill="#020847"/>
      <!-- Nose -->
      <ellipse cx="100" cy="91" rx="3" ry="2" fill="#d4a800"/>
      <!-- Legs -->
      <rect x="75" y="130" width="12" height="20" rx="4" fill="#FFDA27" opacity="0.8"/>

/* ─── Toast System ─── */
const ToastContext = React.createContext(null);
const useToast = () => React.useContext(ToastContext);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = (msg, icon = '✅') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, icon }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  };
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className="toast">
            <span style={{fontSize:'1.1rem'}}>{t.icon}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

/* ─── Live Clock ─── */
function Clock() {
  const [time, setTime] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(id); }, []);
  return <span className="nav-time">{time.toLocaleTimeString('en-PH', {hour:'2-digit', minute:'2-digit', second:'2-digit'})}</span>;
}

/* ─── MODAL ─── */
function Modal({ title, sub, onClose, children }) {
  return (

      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   ROOT APP
════════════════════════════════════════════ */
function App() {
  const [view, setView] = useState('landing');   // landing | auth | student | staff | admin
  const [authRole, setAuthRole] = useState(null);
  const [user, setUser] = useState(null);

  const handleEnter = (role) => { setAuthRole(role); setView('auth'); };
  const handleAuth  = (userData) => { setUser(userData); setView(userData.role); };
  const handleLogout = () => { setUser(null); setAuthRole(null); setView('landing'); };

  const navTabsConfig = [
    { id:'landing', label:'🏥 Home' },
    { id:'student', label:'🎓 Student' },
    { id:'staff',   label:'🩺 Staff' },
    { id:'admin',   label:'⚙️ Admin' },
  ];

  return (
    <ToastProvider>
      {/* NAV */}
      <nav className="topnav">
        <div className="nav-brand" onClick={handleLogout}>
          <PSUSealMini/>
          <div className="nav-brand-text">
            <div className="nav-brand-title">Pangasinan State University</div>
            <div className="nav-brand-sub">University Clinic · Queue System</div>
          </div>
        </div>

        {!user && (
          <div className="nav-tabs">
            {['student','staff','admin'].map(r=>(
              <button key={r} className={`nav-tab ${authRole===r&&view==='auth'?'active':''}`} onClick={()=>handleEnter(r)}>
                {{student:'🎓 Student',staff:'🩺 Staff',admin:'⚙️ Admin'}[r]}
              </button>
            ))}
          </div>
        )}

        {user && (
          <div className="nav-tabs">
            <button className="nav-tab active">
              {{student:'🎓 Student',staff:'🩺 Staff',admin:'⚙️ Admin'}[user.role]}
            </button>
          </div>
        )}

        <div className="nav-actions">
          <Clock/>
          <div className="nav-status-dot" title="System Online"/>
          {user && (
            <button className="btn-secondary" style={{width:'auto',padding:'6px 14px',marginTop:0,fontSize:'0.78rem'}} onClick={handleLogout}>
              Sign Out
            </button>
          )}
        </div>
      </nav>

      {/* VIEWS */}
      {view === 'landing' && <LandingPage onEnter={handleEnter}/>}

      {view === 'auth' && (
        <>
          <LandingPage onEnter={handleEnter}/>
          <AuthModal role={authRole} onAuth={handleAuth} onClose={()=>{setView('landing');setAuthRole(null);}}/>
        </>
      )}

      {view === 'student' && user && <StudentDashboard user={user}/>}
      {view === 'staff'   && user && <StaffDashboard user={user}/>}
      {view === 'admin'   && user && <AdminDashboard user={user}/>}
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>

<script>
/* ─── Splash screen particles ─── */
(function() {
  const container = document.getElementById('particles');
  const colors = ['#FFDA27','#0927D8','#ffffff','#00b894'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*8+5}s;
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(p);
  }
})();

/* ─── Show app after splash ─── */
window.addEventListener('load', function() {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    splash.classList.add('hidden');
    app.classList.add('visible');
    setTimeout(() => { splash.style.display = 'none'; }, 900);
  }, 3800);
});
</script>
